<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Картки товарів</title>
    <!--Підключи CSS-стилі-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Популярні товари</h1>

        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="card swiper-slide">
                    <img class="card-image" src="img/smartphone_Phantom.png" alt="Смартфон">
                    <div class="card-body">
                        <h3>Смартфон Phantom X</h3>
                        <span class="card-price">18 999 ₴</span><br>
                        <button class="card-btn">Додати в кошик</button>
                    </div>
                </div>

                <div class="card swiper-slide">
                    <img class="card-image" src="img/laptop_studio.png" alt="Ноутбук">
                    <div class="card-body">
                        <h3>Ноутбук Studio Pro</h3>
                        <span class="card-price">35 290 ₴</span><br>
                        <button class="card-btn">Додати в кошик</button>
                    </div>
                </div>

                <div class="card swiper-slide">
                    <img class="card-image" src="img/headphones_AirSound.png" alt="Бездротові навушники">
                    <div class="card-body">
                        <h3>Навушники AirSound</h3>
                        <span class="card-price">3 490 ₴</span><br>
                        <button class="card-btn">Додати в кошик</button>
                    </div>
                </div>

                <div class="card swiper-slide">
                    <img class="card-image" src="img/smartwatch_SportPro.png" alt="Смарт-годинник">
                    <div class="card-body">
                        <h3>Смарт-годинник Sport Pro</h3>
                        <span class="card-price">8 999 ₴</span><br>
                        <button class="card-btn">Додати в кошик</button>
                    </div>
                </div>

            </div>

        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>
    <!--Тут підключи JavaScript-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
